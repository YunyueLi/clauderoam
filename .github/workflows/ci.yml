name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck + bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: bash syntax check
        run: |
          for f in clauderoam install.sh bump.sh; do
            echo "→ bash -n $f"
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          shellcheck --severity=warning --shell=bash clauderoam install.sh bump.sh

  smoke-test:
    name: smoke test (init + doctor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install rsync
        run: sudo apt-get update -qq && sudo apt-get install -y rsync

      - name: run init in temp dirs (non-interactive)
        env:
          CLAUDEROAM_DATA: /tmp/cr-data
          CLAUDE_HOME: /tmp/cr-claude
        run: |
          mkdir -p "$CLAUDE_HOME"
          printf "CI User\nen\n" | ./clauderoam init
          ls -la "$CLAUDE_HOME"

      - name: run doctor
        env:
          CLAUDEROAM_DATA: /tmp/cr-data
          CLAUDE_HOME: /tmp/cr-claude
        run: ./clauderoam doctor

      - name: status output
        env:
          CLAUDEROAM_DATA: /tmp/cr-data
          CLAUDE_HOME: /tmp/cr-claude
        run: ./clauderoam status

      - name: projects subcommand
        env:
          CLAUDEROAM_DATA: /tmp/cr-data
          CLAUDE_HOME: /tmp/cr-claude
        run: |
          # Register a project (tiny public repo)
          printf "octocat\nhttps://github.com/octocat/Hello-World.git\n/tmp/cr-projects/octocat\n" \
            | ./clauderoam projects add
          ./clauderoam projects list
          ./clauderoam projects clone-all --dry-run
          ./clauderoam projects status   # 'octocat' should show as missing
          ./clauderoam projects remove octocat
          # Empty state after removal
          ./clauderoam projects list

      - name: push — memory-only divergence auto-resolves
        run: |
          set -e
          T=/tmp/cr-divtest
          rm -rf "$T" && mkdir -p "$T"

          # Bootstrap: init local first (with main branch), push initial commit
          # to bare remote. This avoids 'clone empty bare repo' edge cases.
          git init -q --bare --initial-branch=main "$T/remote.git"
          git init -q --initial-branch=main "$T/local"
          (
            cd "$T/local"
            git config user.email a@b.c && git config user.name t
            mkdir -p memory && echo init > CLAUDE.md
            git add -A && git commit -q -m init
            git remote add origin "$T/remote.git"
            git push -q -u origin main
          )

          # Remote-side worker adds a memory snapshot
          git clone -q "$T/remote.git" "$T/rwork"
          (
            cd "$T/rwork"
            git config user.email r@r.c && git config user.name r
            mkdir -p memory/proj-a && echo r > memory/proj-a/MEMORY.md
            git add -A && git commit -q -m "remote sync"
            git push -q
          )

          # Local-side adds a different memory snapshot — now diverged
          (
            cd "$T/local"
            mkdir -p memory/proj-b && echo l > memory/proj-b/MEMORY.md
            git add -A && git commit -q -m "local sync"
            git fetch -q origin
            test -n "$(git rev-list origin/main..HEAD)" || { echo "FIXTURE BUG: no local-only commits"; exit 1; }
            test -n "$(git rev-list HEAD..origin/main)" || { echo "FIXTURE BUG: no remote-only commits"; exit 1; }
          )

          # clauderoam push should auto-resolve
          CLAUDEROAM_DATA="$T/local" CLAUDE_HOME=/tmp/empty-claude \
            "$GITHUB_WORKSPACE/clauderoam" push 2>&1 | tee /tmp/push.log
          grep -q "Divergence detected" /tmp/push.log
          grep -q "Reset to" /tmp/push.log
          grep -q "Pushed\|Nothing to commit" /tmp/push.log

      - name: push — non-memory divergence refuses
        run: |
          set -e
          T=/tmp/cr-divtest2
          rm -rf "$T" && mkdir -p "$T"
          git init -q --bare --initial-branch=main "$T/remote.git"
          git init -q --initial-branch=main "$T/local"
          (
            cd "$T/local"
            git config user.email a@b.c && git config user.name t
            echo init > CLAUDE.md
            git add -A && git commit -q -m init
            git remote add origin "$T/remote.git"
            git push -q -u origin main
          )

          git clone -q "$T/remote.git" "$T/rwork"
          (
            cd "$T/rwork"
            git config user.email r@r.c && git config user.name r
            echo "remote edit" >> CLAUDE.md
            git add -A && git commit -q -m "remote edit"
            git push -q
          )

          (
            cd "$T/local"
            echo "local edit" >> CLAUDE.md
            git add -A && git commit -q -m "local edit"
          )

          set +e
          CLAUDEROAM_DATA="$T/local" CLAUDE_HOME=/tmp/empty-claude \
            "$GITHUB_WORKSPACE/clauderoam" push 2>&1 | tee /tmp/push2.log
          rc=${PIPESTATUS[0]}
          set -e

          if [ "$rc" = 0 ]; then
            echo "FAIL: expected non-zero exit for non-memory divergence (got 0)"
            exit 1
          fi
          grep -q "Cannot auto-resolve" /tmp/push2.log || { echo "FAIL: missing 'Cannot auto-resolve' in output"; exit 1; }
          grep -q "CLAUDE.md" /tmp/push2.log || { echo "FAIL: CLAUDE.md not listed as offending file"; exit 1; }

  formula-test:
    name: homebrew formula test (macOS)
    runs-on: macos-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: tap & install
        run: |
          brew tap YunyueLi/tap
          brew install --build-from-source YunyueLi/tap/clauderoam
          clauderoam version
          clauderoam help
