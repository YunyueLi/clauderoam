name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck + bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: bash syntax check
        run: |
          for f in clauderoam install.sh bump.sh; do
            echo "→ bash -n $f"
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          shellcheck --severity=warning --shell=bash clauderoam install.sh bump.sh

  smoke-test:
    name: smoke test (init + doctor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install rsync
        run: sudo apt-get update -qq && sudo apt-get install -y rsync

      - name: run init in temp dirs (non-interactive)
        env:
          CLAUDEROAM_DATA: /tmp/cr-data
          CLAUDE_HOME: /tmp/cr-claude
        run: |
          mkdir -p "$CLAUDE_HOME"
          printf "CI User\nen\n" | ./clauderoam init
          ls -la "$CLAUDE_HOME"

      - name: run doctor
        env:
          CLAUDEROAM_DATA: /tmp/cr-data
          CLAUDE_HOME: /tmp/cr-claude
        run: ./clauderoam doctor

      - name: status output
        env:
          CLAUDEROAM_DATA: /tmp/cr-data
          CLAUDE_HOME: /tmp/cr-claude
        run: ./clauderoam status

      - name: projects subcommand
        env:
          CLAUDEROAM_DATA: /tmp/cr-data
          CLAUDE_HOME: /tmp/cr-claude
        run: |
          # Register a project (tiny public repo)
          printf "octocat\nhttps://github.com/octocat/Hello-World.git\n/tmp/cr-projects/octocat\n" \
            | ./clauderoam projects add
          ./clauderoam projects list
          ./clauderoam projects clone-all --dry-run
          ./clauderoam projects status   # 'octocat' should show as missing
          ./clauderoam projects remove octocat
          # Empty state after removal
          ./clauderoam projects list

      - name: push — memory-only divergence auto-resolves
        run: |
          # Set up a fake bare-remote + local clone with diverging memory commits
          T=/tmp/cr-divtest
          rm -rf "$T" && mkdir -p "$T"
          git init -q --bare "$T/remote.git"
          git clone -q "$T/remote.git" "$T/local"
          cd "$T/local"
          git config user.email a@b.c && git config user.name t
          mkdir -p memory && echo "init" > CLAUDE.md
          git add -A && git commit -q -m init
          git branch -M main && git push -q -u origin main

          # Remote adds memory snapshot
          git clone -q "$T/remote.git" "$T/rwork"
          cd "$T/rwork" && git config user.email r@r.c && git config user.name r
          mkdir -p memory/proj-a && echo r > memory/proj-a/MEMORY.md
          git add -A && git commit -q -m "remote sync" && git push -q

          # Local also adds a different memory snapshot
          cd "$T/local"
          mkdir -p memory/proj-b && echo l > memory/proj-b/MEMORY.md
          git add -A && git commit -q -m "local sync"

          # Now divergence exists. clauderoam push should auto-resolve.
          CLAUDEROAM_DATA="$T/local" CLAUDE_HOME=/tmp/empty-claude \
            $GITHUB_WORKSPACE/clauderoam push 2>&1 | tee /tmp/push.log
          grep -q "Divergence detected" /tmp/push.log
          grep -q "Reset to origin/main" /tmp/push.log
          grep -q "Pushed" /tmp/push.log

      - name: push — non-memory divergence refuses
        run: |
          T=/tmp/cr-divtest2
          rm -rf "$T" && mkdir -p "$T"
          git init -q --bare "$T/remote.git"
          git clone -q "$T/remote.git" "$T/local"
          cd "$T/local"
          git config user.email a@b.c && git config user.name t
          echo init > CLAUDE.md
          git add -A && git commit -q -m init
          git branch -M main && git push -q -u origin main

          git clone -q "$T/remote.git" "$T/rwork"
          cd "$T/rwork" && git config user.email r@r.c && git config user.name r
          echo "remote edit" >> CLAUDE.md
          git add -A && git commit -q -m "remote edit" && git push -q

          cd "$T/local"
          echo "local edit" >> CLAUDE.md
          git add -A && git commit -q -m "local edit"

          # Should refuse with exit 1
          if CLAUDEROAM_DATA="$T/local" CLAUDE_HOME=/tmp/empty-claude \
               $GITHUB_WORKSPACE/clauderoam push 2>&1 | tee /tmp/push2.log; then
            echo "FAIL: expected non-zero exit for non-memory divergence"
            exit 1
          fi
          grep -q "Cannot auto-resolve" /tmp/push2.log
          grep -q "CLAUDE.md" /tmp/push2.log

  formula-test:
    name: homebrew formula test (macOS)
    runs-on: macos-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: tap & install
        run: |
          brew tap YunyueLi/tap
          brew install --build-from-source YunyueLi/tap/clauderoam
          clauderoam version
          clauderoam help
