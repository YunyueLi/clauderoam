<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <rect width="1200" height="320" fill="#ffffff"/>

  <!-- Eyebrow accent -->
  <line x1="540" y1="80" x2="660" y2="80" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Project title -->
  <text x="600" y="170" font-family="-apple-system, system-ui, sans-serif"
        font-size="86" font-weight="700" fill="#0f172a"
        text-anchor="middle" letter-spacing="-3">ClaudeRoam</text>

  <!-- Primary tagline -->
  <text x="600" y="218" font-family="-apple-system, system-ui, sans-serif"
        font-size="22" font-weight="500" fill="#334155" text-anchor="middle">
    Your Claude Code config, anywhere.
  </text>

  <!-- Secondary tagline -->
  <text x="600" y="250" font-family="-apple-system, system-ui, sans-serif"
        font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    Across Macs  ·  Across accounts  ·  Without the copy-paste
  </text>

  <!-- Bottom hairline -->
  <line x1="80" y1="282" x2="1120" y2="282" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Footer: install command -->
  <text x="600" y="306" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="13" fill="#64748b" text-anchor="middle">
    $ brew install YunyueLi/tap/clauderoam
  </text>
</svg>
