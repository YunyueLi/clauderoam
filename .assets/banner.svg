<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid pattern in the background -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.4">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- Top accent line -->
  <rect x="80" y="60" width="1040" height="2" fill="url(#accent)"/>

  <!-- Project title -->
  <text x="600" y="160" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="92" font-weight="800" fill="url(#title)"
        text-anchor="middle" letter-spacing="-2" filter="url(#glow)">clauderoam</text>

  <!-- Primary tagline -->
  <text x="600" y="215" font-family="-apple-system, system-ui, sans-serif"
        font-size="26" font-weight="500" fill="#e2e8f0" text-anchor="middle">
    Your Claude Code config, anywhere.
  </text>

  <!-- Secondary tagline with separator dots -->
  <text x="600" y="252" font-family="-apple-system, system-ui, sans-serif"
        font-size="18" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    Across Macs  ·  Across accounts  ·  Without the copy-paste
  </text>

  <!-- Bottom accent line -->
  <rect x="80" y="276" width="1040" height="2" fill="url(#accent)"/>

  <!-- Footer: install command -->
  <text x="600" y="306" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="14" fill="#64748b" text-anchor="middle">
    $ brew install YunyueLi/tap/clauderoam
  </text>
</svg>
