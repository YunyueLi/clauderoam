<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <rect width="1000" height="500" fill="#ffffff"/>

  <!-- Eyebrow -->
  <text x="80" y="58" font-family="-apple-system, system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#6366f1" letter-spacing="2">TWO SOURCES</text>

  <!-- Title -->
  <text x="80" y="92" font-family="-apple-system, system-ui, sans-serif"
        font-size="26" font-weight="600" fill="#0f172a" letter-spacing="-0.5">
    Personal config vs project config
  </text>
  <text x="80" y="118" font-family="-apple-system, system-ui, sans-serif"
        font-size="14" fill="#64748b">
    One follows you. The other follows the code. Both end up in <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#334155">~/.claude/</tspan>.
  </text>

  <!-- ===== Left column: ClaudeRoam (Personal) ===== -->
  <g transform="translate(80, 162)">
    <!-- Left accent stripe -->
    <rect x="0" y="0" width="3" height="190" fill="#6366f1"/>

    <text x="20" y="22" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" font-weight="600" fill="#6366f1" letter-spacing="2">PERSONAL</text>
    <text x="20" y="48" font-family="-apple-system, system-ui, sans-serif"
          font-size="18" font-weight="600" fill="#0f172a">ClaudeRoam</text>
    <text x="20" y="70" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" fill="#475569">~/clauderoam/</text>

    <line x1="20" y1="90" x2="400" y2="90" stroke="#e5e7eb" stroke-width="1"/>

    <text x="20" y="116" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#334155">“reply in 中文”</text>
    <text x="20" y="138" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#334155">/commit slash command</text>
    <text x="20" y="160" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#334155">code-reviewer agent</text>
    <text x="20" y="182" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#334155">auto-memory across projects</text>

    <text x="20" y="210" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#94a3b8">One repo, tracked in git.</text>
  </g>

  <!-- ===== Right column: Project repos ===== -->
  <g transform="translate(540, 162)">
    <rect x="0" y="0" width="3" height="190" fill="#e5e7eb"/>

    <text x="20" y="22" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="2">PROJECT REPOS</text>
    <text x="20" y="48" font-family="-apple-system, system-ui, sans-serif"
          font-size="18" font-weight="600" fill="#0f172a">Project A · Project B · …</text>
    <text x="20" y="70" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" fill="#475569">&lt;project&gt;/CLAUDE.md + .claude/</text>

    <line x1="20" y1="90" x2="400" y2="90" stroke="#e5e7eb" stroke-width="1"/>

    <text x="20" y="116" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#334155">Tech stack &amp; runtime</text>
    <text x="20" y="138" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#334155">Test &amp; build commands</text>
    <text x="20" y="160" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#334155">Code conventions</text>
    <text x="20" y="182" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#334155" font-style="italic">Different for every project.</text>

    <text x="20" y="210" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#94a3b8">One per codebase.</text>
  </g>

  <!-- ===== Connector lines to hub ===== -->
  <!-- Left → hub -->
  <path d="M 280 392 L 280 420 L 500 420" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="316" y="412" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8">symlinks</text>

  <!-- Right → hub -->
  <path d="M 740 392 L 740 420 L 500 420" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="660" y="412" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8">on open</text>

  <!-- Arrow into hub -->
  <line x1="500" y1="420" x2="500" y2="438" stroke="#cbd5e1" stroke-width="1.5"/>
  <polygon points="500,444 495,436 505,436" fill="#cbd5e1"/>

  <!-- ===== Hub: ~/.claude/ ===== -->
  <g transform="translate(340, 444)">
    <rect width="320" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="160" y="20" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">~/.claude/</text>
    <text x="160" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" fill="#94a3b8" text-anchor="middle">Claude Code reads here, both layers combined.</text>
  </g>
</svg>
