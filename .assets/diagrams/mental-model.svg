<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" width="1000" height="440">
  <rect width="1000" height="440" fill="#ffffff"/>

  <!-- Eyebrow -->
  <text x="80" y="58" font-family="-apple-system, system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#6366f1" letter-spacing="2">THREE LAYERS</text>

  <!-- Title -->
  <text x="80" y="92" font-family="-apple-system, system-ui, sans-serif"
        font-size="26" font-weight="600" fill="#0f172a" letter-spacing="-0.5">
    How Claude Code reads your config
  </text>
  <text x="80" y="118" font-family="-apple-system, system-ui, sans-serif"
        font-size="14" fill="#64748b">
    Loaded top to bottom on every session.
  </text>

  <!-- Top rule -->
  <line x1="80" y1="148" x2="920" y2="148" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== Row 1: Personal (ClaudeRoam-managed, left accent stripe) ===== -->
  <g transform="translate(80, 148)">
    <rect x="0" y="0" width="3" height="84" fill="#6366f1"/>
    <text x="32" y="36" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" font-weight="500" fill="#94a3b8">01</text>
    <text x="96" y="36" font-family="-apple-system, system-ui, sans-serif"
          font-size="15" font-weight="600" fill="#0f172a">Personal</text>
    <text x="180" y="36" font-family="-apple-system, system-ui, sans-serif"
          font-size="14" fill="#cbd5e1">·</text>
    <text x="196" y="36" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" fill="#475569">~/.claude/</text>
    <text x="96" y="62" font-family="-apple-system, system-ui, sans-serif"
          font-size="13" fill="#475569">Preferences, custom agents, slash commands, auto-memory.</text>
    <text x="96" y="80" font-family="-apple-system, system-ui, sans-serif"
          font-size="12" fill="#6366f1">Managed by ClaudeRoam, synced across machines.</text>
    <line x1="0" y1="100" x2="840" y2="100" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- ===== Row 2: Project ===== -->
  <g transform="translate(80, 248)">
    <text x="32" y="36" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" font-weight="500" fill="#94a3b8">02</text>
    <text x="96" y="36" font-family="-apple-system, system-ui, sans-serif"
          font-size="15" font-weight="600" fill="#0f172a">Project</text>
    <text x="172" y="36" font-family="-apple-system, system-ui, sans-serif"
          font-size="14" fill="#cbd5e1">·</text>
    <text x="188" y="36" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" fill="#475569">&lt;project&gt;/CLAUDE.md + .claude/</text>
    <text x="96" y="62" font-family="-apple-system, system-ui, sans-serif"
          font-size="13" fill="#475569">Tech stack, test commands, conventions, per-project agents.</text>
    <text x="96" y="80" font-family="-apple-system, system-ui, sans-serif"
          font-size="12" fill="#94a3b8">Travels with the codebase.</text>
    <line x1="0" y1="100" x2="840" y2="100" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- ===== Row 3: Session ===== -->
  <g transform="translate(80, 348)">
    <text x="32" y="36" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" font-weight="500" fill="#94a3b8">03</text>
    <text x="96" y="36" font-family="-apple-system, system-ui, sans-serif"
          font-size="15" font-weight="600" fill="#0f172a">Session</text>
    <text x="176" y="36" font-family="-apple-system, system-ui, sans-serif"
          font-size="14" fill="#cbd5e1">·</text>
    <text x="192" y="36" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" fill="#475569">this conversation</text>
    <text x="96" y="62" font-family="-apple-system, system-ui, sans-serif"
          font-size="13" fill="#475569">Whatever we type right now — lives in the transcript only.</text>
  </g>
</svg>
