<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <rect width="1000" height="520" fill="#ffffff"/>

  <!-- Eyebrow -->
  <text x="80" y="58" font-family="-apple-system, system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#6366f1" letter-spacing="2">CONFLICT HANDLING</text>

  <!-- Title -->
  <text x="80" y="92" font-family="-apple-system, system-ui, sans-serif"
        font-size="26" font-weight="600" fill="#0f172a" letter-spacing="-0.5">
    <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" font-weight="500">clauderoam push</tspan> — four cases
  </text>
  <text x="80" y="118" font-family="-apple-system, system-ui, sans-serif"
        font-size="14" fill="#64748b">
    After <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#334155">git fetch origin</tspan>, compare HEAD vs origin/main:
  </text>

  <!-- Top rule -->
  <line x1="80" y1="148" x2="920" y2="148" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== Case 01: at-or-ahead ===== -->
  <g transform="translate(80, 148)">
    <rect x="0" y="0" width="3" height="68" fill="#22c55e"/>
    <text x="24" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" font-weight="500" fill="#94a3b8">01</text>
    <text x="84" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="14" font-weight="600" fill="#0f172a">at-or-ahead</text>
    <text x="84" y="56" font-family="-apple-system, system-ui, sans-serif"
          font-size="13" fill="#475569">Nothing to fetch.</text>
    <text x="440" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="13" fill="#15803d">go to push</text>
    <text x="840" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" fill="#16a34a" text-anchor="end" font-weight="500">OK</text>
    <line x1="0" y1="84" x2="840" y2="84" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- ===== Case 02: behind, can FF ===== -->
  <g transform="translate(80, 232)">
    <rect x="0" y="0" width="3" height="68" fill="#22c55e"/>
    <text x="24" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" font-weight="500" fill="#94a3b8">02</text>
    <text x="84" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="14" font-weight="600" fill="#0f172a">behind · can fast-forward</text>
    <text x="84" y="56" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="12" fill="#475569">git merge --ff-only</text>
    <text x="440" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="13" fill="#15803d">go to push</text>
    <text x="840" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" fill="#16a34a" text-anchor="end" font-weight="500">OK</text>
    <line x1="0" y1="84" x2="840" y2="84" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- ===== Case 03: diverged, memory-only ===== -->
  <g transform="translate(80, 316)">
    <rect x="0" y="0" width="3" height="68" fill="#f59e0b"/>
    <text x="24" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" font-weight="500" fill="#94a3b8">03</text>
    <text x="84" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="14" font-weight="600" fill="#0f172a">diverged · memory-only</text>
    <text x="84" y="56" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="12" fill="#475569">reset --hard origin/main</text>
    <text x="440" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="13" fill="#b45309">auto-resolve</text>
    <text x="440" y="56" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" fill="#94a3b8" font-style="italic">memory is regenerable</text>
    <text x="840" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" fill="#d97706" text-anchor="end" font-weight="500">AUTO</text>
    <line x1="0" y1="84" x2="840" y2="84" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- ===== Case 04: diverged, non-memory files ===== -->
  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="3" height="68" fill="#ef4444"/>
    <text x="24" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" font-weight="500" fill="#94a3b8">04</text>
    <text x="84" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="14" font-weight="600" fill="#0f172a">diverged · includes non-memory files</text>
    <text x="84" y="56" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="12" fill="#475569">exit 1</text>
    <text x="440" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="13" fill="#991b1b">refuse, ask user to resolve</text>
    <text x="840" y="34" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" fill="#dc2626" text-anchor="end" font-weight="500">REFUSE</text>
    <line x1="0" y1="84" x2="840" y2="84" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- ===== Footer ===== -->
  <text x="500" y="500" font-family="-apple-system, system-ui, sans-serif"
        font-size="13" fill="#64748b" text-anchor="middle">
    Cases 01–03 end in <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">sync → git commit → git push</tspan>.
  </text>
</svg>
