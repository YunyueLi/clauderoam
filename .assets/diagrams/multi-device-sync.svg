<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <rect width="1100" height="520" fill="#ffffff"/>

  <!-- Eyebrow -->
  <text x="80" y="58" font-family="-apple-system, system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#6366f1" letter-spacing="2">MULTI-DEVICE</text>

  <!-- Title -->
  <text x="80" y="92" font-family="-apple-system, system-ui, sans-serif"
        font-size="26" font-weight="600" fill="#0f172a" letter-spacing="-0.5">
    Symlinks, not sync
  </text>
  <text x="80" y="118" font-family="-apple-system, system-ui, sans-serif"
        font-size="14" fill="#64748b">
    Two Macs, one git repo, zero copy-paste.
  </text>

  <!-- ============ Mac A panel ============ -->
  <g transform="translate(80, 160)">
    <text x="0" y="14" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="2">MAC A</text>

    <!-- ~/.claude/ card -->
    <g transform="translate(0, 32)">
      <rect width="280" height="72" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <text x="16" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" font-weight="600" fill="#0f172a">~/.claude/</text>
      <text x="16" y="46" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#64748b">CLAUDE.md, agents/, commands/</text>
      <text x="16" y="62" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">Claude Code reads here.</text>
    </g>

    <!-- Symlink connector -->
    <g transform="translate(140, 110)">
      <line x1="0" y1="0" x2="0" y2="44" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
      <polygon points="0,48 -4,40 4,40" fill="#cbd5e1"/>
      <text x="12" y="28" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">symlink</text>
    </g>

    <!-- ~/clauderoam/ card -->
    <g transform="translate(0, 164)">
      <rect width="280" height="92" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <text x="16" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" font-weight="600" fill="#0f172a">~/clauderoam/</text>
      <text x="16" y="46" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#64748b">CLAUDE.md (real file), agents/, …</text>
      <text x="16" y="62" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#64748b">.git/</text>
      <text x="16" y="82" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">Tracked in git.</text>
    </g>
  </g>

  <!-- ============ GitHub hub (center) ============ -->
  <g transform="translate(440, 268)">
    <text x="0" y="-12" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" font-weight="600" fill="#6366f1" letter-spacing="2">GITHUB</text>
    <rect width="220" height="76" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="110" y="30" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">clauderoam-config</text>
    <text x="110" y="50" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" fill="#64748b" text-anchor="middle">your private repo</text>
    <text x="110" y="66" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">single source of truth</text>
  </g>

  <!-- ============ Mac B panel (mirror of A) ============ -->
  <g transform="translate(740, 160)">
    <text x="0" y="14" font-family="-apple-system, system-ui, sans-serif"
          font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="2">MAC B</text>

    <g transform="translate(0, 32)">
      <rect width="280" height="72" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <text x="16" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" font-weight="600" fill="#0f172a">~/.claude/</text>
      <text x="16" y="46" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#64748b">CLAUDE.md, agents/, commands/</text>
      <text x="16" y="62" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">Claude Code reads here.</text>
    </g>

    <g transform="translate(140, 110)">
      <line x1="0" y1="0" x2="0" y2="44" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
      <polygon points="0,48 -4,40 4,40" fill="#cbd5e1"/>
      <text x="12" y="28" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">symlink</text>
    </g>

    <g transform="translate(0, 164)">
      <rect width="280" height="92" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <text x="16" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" font-weight="600" fill="#0f172a">~/clauderoam/</text>
      <text x="16" y="46" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#64748b">CLAUDE.md (real file), agents/, …</text>
      <text x="16" y="62" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#64748b">.git/</text>
      <text x="16" y="82" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">Tracked in git.</text>
    </g>
  </g>

  <!-- ============ Push/pull arrows (Mac A repo ↔ GitHub ↔ Mac B repo) ============ -->
  <!-- Mac A bidirectional -->
  <line x1="360" y1="310" x2="440" y2="310" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="370,305 360,310 370,315" fill="#94a3b8"/>
  <polygon points="430,305 440,310 430,315" fill="#94a3b8"/>
  <text x="400" y="298" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">git push/pull</text>

  <!-- Mac B bidirectional -->
  <line x1="660" y1="310" x2="740" y2="310" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="670,305 660,310 670,315" fill="#94a3b8"/>
  <polygon points="730,305 740,310 730,315" fill="#94a3b8"/>
  <text x="700" y="298" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">git push/pull</text>

  <!-- ============ Footer ============ -->
  <line x1="80" y1="464" x2="1020" y2="464" stroke="#e5e7eb" stroke-width="1"/>
  <text x="550" y="490" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">
    Editing <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">~/.claude/CLAUDE.md</tspan> is editing <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">~/clauderoam/CLAUDE.md</tspan> — only one file on disk.
  </text>
</svg>
